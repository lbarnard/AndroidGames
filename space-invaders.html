<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Space Invaders</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const cvs = document.getElementById('c');
const ctx = cvs.getContext('2d');
const W = cvs.width = 800;
const H = cvs.height = 600;

// ── Sprite Data (8x8, each element = one row bitmask) ────────────────────────
const SCALE = 3;
const ALIEN_TYPES = [
  // Squid – bottom 2 rows – 10 pts – green
  { frames: [[0x18,0x3C,0x7E,0xDB,0xFF,0x24,0x5A,0x81],[0x18,0x3C,0x7E,0xDB,0xFF,0x24,0x81,0x5A]], color:'#00ff55', pts:10 },
  // Crab  – middle 2 rows – 20 pts – cyan
  { frames: [[0x66,0x3C,0xFF,0xDB,0xFF,0x66,0x24,0x42],[0x66,0x3C,0xFF,0xDB,0xFF,0x24,0x42,0x81]], color:'#00ddff', pts:20 },
  // Octopus – top row    – 30 pts – magenta
  { frames: [[0x3C,0x7E,0xFF,0xDB,0xFF,0x3C,0x24,0x42],[0x3C,0x7E,0xFF,0xDB,0xFF,0x3C,0x42,0x24]], color:'#ff44ff', pts:30 },
];

// ── Layout ────────────────────────────────────────────────────────────────────
const COLS = 11, ROWS = 5;
const AW = 8 * SCALE, AH = 8 * SCALE;
const HGAP = 16, VGAP = 12;
const ASTEP_X = AW + HGAP;               // 40
const ASTEP_Y = AH + VGAP;              // 36
const GRID_W  = COLS * ASTEP_X - HGAP; // 424
const GRID_X0 = (W - GRID_W) / 2;      // 188
const GRID_Y0 = 70;
const PLAYER_Y   = H - 60;
const PLAYER_W   = 40, PLAYER_H = 20;
const PLAYER_SPD = 4;
const BULLET_SPD = 9;
const ABUL_SPD   = 3;
const SH_COLS = 22, SH_ROWS = 14, SH_PX = 3;

// ── State ─────────────────────────────────────────────────────────────────────
let phase = 'start';
let player, grid, bullets, abuls, shields, ufo;
let score, lives, wave, hiScore = 0;
let alienDir, alienX, alienY, stepTimer, alienBulTimer, ufoTimer;
let marchBeat = 0, marchBase = 60;
let animFrame = 0, shootPressed = false;
const keys = {};

// ── Input ─────────────────────────────────────────────────────────────────────
addEventListener('keydown', e => {
  keys[e.key] = true;
  if ([' ','ArrowLeft','ArrowRight','ArrowUp'].includes(e.key)) e.preventDefault();
  if ([' ','Enter'].includes(e.key)) {
    if (phase === 'start' || phase === 'gameover') initGame();
    else if (phase === 'win') { wave++; initWave(); phase = 'play'; }
  }
});
addEventListener('keyup', e => { keys[e.key] = false; });
cvs.addEventListener('click', () => {
  if (phase === 'start' || phase === 'gameover') initGame();
  else if (phase === 'win') { wave++; initWave(); phase = 'play'; }
});

// ── Shield Builder ────────────────────────────────────────────────────────────
function makeShield() {
  const g = new Uint8Array(SH_COLS * SH_ROWS);
  for (let r = 0; r < SH_ROWS; r++) {
    for (let c = 0; c < SH_COLS; c++) {
      let solid = true;
      if (r < 4 && c < 4 - r) solid = false;
      if (r < 4 && c >= SH_COLS - (4 - r)) solid = false;
      if (r >= 9 && c >= 7 && c < SH_COLS - 7) solid = false;
      if (solid) g[r * SH_COLS + c] = 1;
    }
  }
  return g;
}

// ── Init ──────────────────────────────────────────────────────────────────────
function initGame() {
  score = 0; lives = 3; wave = 1;
  initWave(); phase = 'play';
}

function initWave() {
  player = { x: W / 2, inv: 0 };
  bullets = []; abuls = [];
  alienDir = 1; alienX = 0; alienY = 0;
  stepTimer = 0; alienBulTimer = 0;
  marchBase = Math.max(8, 60 - (wave - 1) * 8);
  ufoTimer = 500 + Math.floor(Math.random() * 400);
  ufo = null; animFrame = 0; shootPressed = false;

  grid = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      grid.push({ r, c, type: r === 0 ? 2 : r < 3 ? 1 : 0, alive: true });

  shields = [0,1,2,3].map(i => ({
    x: Math.round(W * 0.13 + i * W * 0.245),
    y: PLAYER_Y - 95,
    g: makeShield()
  }));
}

// ── Helpers ───────────────────────────────────────────────────────────────────
const alive    = () => grid.filter(a => a.alive);
const alienPos = a  => ({ x: GRID_X0 + a.c * ASTEP_X + alienX, y: GRID_Y0 + a.r * ASTEP_Y + alienY });

function bottomInCol(c) {
  for (let r = ROWS - 1; r >= 0; r--) {
    const a = grid[r * COLS + c];
    if (a && a.alive) return a;
  }
  return null;
}

function hitShield(bx, by) {
  for (const sh of shields) {
    const lc = Math.floor((bx - sh.x) / SH_PX);
    const lr = Math.floor((by - sh.y) / SH_PX);
    if (lc < 0 || lc >= SH_COLS || lr < 0 || lr >= SH_ROWS) continue;
    if (!sh.g[lr * SH_COLS + lc]) continue;
    for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
      const nr = lr+dr, nc = lc+dc;
      if (nr>=0 && nr<SH_ROWS && nc>=0 && nc<SH_COLS) sh.g[nr*SH_COLS+nc] = 0;
    }
    return true;
  }
  return false;
}

// ── Audio ─────────────────────────────────────────────────────────────────────
let audioCtx;
function ac() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function tone(freq, dur, type='square', vol=0.22) {
  const a=ac(), o=a.createOscillator(), g=a.createGain();
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(vol,a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur);
  o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime+dur);
}
function boom(dur=0.4, vol=0.5, fEnd=80) {
  const a=ac(), buf=a.createBuffer(1,a.sampleRate*dur,a.sampleRate);
  const d=buf.getChannelData(0);
  for (let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
  const src=a.createBufferSource(); src.buffer=buf;
  const f=a.createBiquadFilter(); f.type='lowpass';
  f.frequency.setValueAtTime(900,a.currentTime);
  f.frequency.exponentialRampToValueAtTime(fEnd,a.currentTime+dur*0.5);
  const g=a.createGain(); g.gain.value=vol;
  src.connect(f); f.connect(g); g.connect(a.destination); src.start();
}
const MARCH_NOTES = [160,130,110,130];
function playMarch()    { tone(MARCH_NOTES[marchBeat++ % 4], 0.07, 'square', 0.16); }
function playShoot()    {
  const a=ac(), o=a.createOscillator(), g=a.createGain();
  o.type='square';
  o.frequency.setValueAtTime(880,a.currentTime);
  o.frequency.exponentialRampToValueAtTime(110,a.currentTime+0.14);
  g.gain.setValueAtTime(0.28,a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.14);
  o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime+0.14);
}
function playAlienDie() { boom(0.3, 0.35, 140); }
function playPlayerDie(){ boom(1.2, 0.7,  40);  }
function playUFODie()   { [900,600,350,150].forEach((f,i)=>setTimeout(()=>tone(f,0.12,'sawtooth',0.3),i*70)); }

let ufoOsc=null, ufoGain=null;
function startUFOHum() {
  if (ufoOsc) return;
  const a=ac();
  ufoOsc=a.createOscillator(); ufoGain=a.createGain();
  ufoOsc.type='sawtooth'; ufoOsc.frequency.value=55; ufoGain.gain.value=0.1;
  ufoOsc.connect(ufoGain); ufoGain.connect(a.destination); ufoOsc.start();
}
function stopUFOHum() {
  if (!ufoOsc) return;
  ufoGain.gain.setTargetAtTime(0,audioCtx.currentTime,0.05);
  const o=ufoOsc; ufoOsc=null; ufoGain=null;
  setTimeout(()=>{try{o.stop();}catch(_){}},300);
}

// ── Update ────────────────────────────────────────────────────────────────────
function update() {
  if (phase !== 'play') return;

  // Player movement
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) player.x -= PLAYER_SPD;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) player.x += PLAYER_SPD;
  player.x = Math.max(PLAYER_W/2, Math.min(W-PLAYER_W/2, player.x));
  if (player.inv > 0) player.inv--;

  // Shoot (require key release between shots)
  const shootKey = keys[' '] || keys['ArrowUp'] || keys['w'] || keys['W'];
  if (shootKey && !shootPressed && bullets.length === 0) {
    bullets.push({ x: player.x, y: PLAYER_Y - PLAYER_H });
    playShoot();
  }
  shootPressed = shootKey;

  // Player bullet movement
  for (let i = bullets.length-1; i >= 0; i--) {
    const b = bullets[i];
    b.y -= BULLET_SPD;
    if (b.y < 0) { bullets.splice(i,1); continue; }
    if (hitShield(b.x, b.y)) { bullets.splice(i,1); continue; }

    // vs UFO
    if (ufo && !ufo.dying && b.x >= ufo.x && b.x < ufo.x+50 && b.y >= ufo.y && b.y < ufo.y+18) {
      const pts = (Math.floor(Math.random()*6)+1)*50;
      score += pts; hiScore = Math.max(hiScore, score);
      ufo.dying = pts; ufo.dt = 90;
      stopUFOHum(); playUFODie();
      bullets.splice(i,1); continue;
    }

    // vs alien
    let hit = false;
    for (const a of alive()) {
      const p = alienPos(a);
      if (b.x >= p.x && b.x < p.x+AW && b.y >= p.y && b.y < p.y+AH) {
        a.alive = false;
        score += ALIEN_TYPES[a.type].pts;
        hiScore = Math.max(hiScore, score);
        playAlienDie(); hit = true; break;
      }
    }
    if (hit) { bullets.splice(i,1); }
  }

  // Alien march
  const liveAliens = alive();
  if (liveAliens.length === 0) { phase = 'win'; return; }
  const interval = Math.max(4, Math.floor(marchBase * liveAliens.length / (COLS*ROWS)));
  if (++stepTimer >= interval) {
    stepTimer = 0; animFrame ^= 1; playMarch();
    alienX += alienDir * 8;

    let minX = Infinity, maxX = -Infinity;
    for (const a of liveAliens) {
      const p = alienPos(a);
      minX = Math.min(minX, p.x);
      maxX = Math.max(maxX, p.x + AW);
    }
    if (maxX >= W-8 || minX <= 8) {
      alienDir *= -1;
      alienX   += alienDir * 8;
      alienY   += 18;
      for (const a of liveAliens) {
        if (GRID_Y0 + a.r*ASTEP_Y + alienY + AH >= PLAYER_Y-8) { phase='gameover'; return; }
      }
    }
  }

  // Alien shooting
  if (++alienBulTimer >= 55 && abuls.length < 4) {
    alienBulTimer = 0;
    const cols = [...new Set(liveAliens.map(a => a.c))];
    const src  = bottomInCol(cols[Math.floor(Math.random()*cols.length)]);
    if (src) {
      const p = alienPos(src);
      abuls.push({ x: p.x + AW/2, y: p.y + AH });
      tone(200 + Math.random()*80, 0.08, 'sawtooth', 0.12);
    }
  }

  // Alien bullet movement
  for (let i = abuls.length-1; i >= 0; i--) {
    const b = abuls[i];
    b.y += ABUL_SPD;
    if (b.y > H) { abuls.splice(i,1); continue; }
    if (hitShield(b.x, b.y)) { abuls.splice(i,1); continue; }
    if (player.inv === 0 &&
        b.x >= player.x-PLAYER_W/2 && b.x <= player.x+PLAYER_W/2 &&
        b.y >= PLAYER_Y-PLAYER_H   && b.y <= PLAYER_Y) {
      abuls.splice(i,1);
      if (--lives <= 0) { playPlayerDie(); phase='gameover'; return; }
      playPlayerDie();
      player.inv = 180;
    }
  }

  // UFO
  if (--ufoTimer <= 0 && !ufo) {
    ufo = { x: -55, y: 28, dir: 1 };
    if (Math.random() < 0.5) { ufo.x = W+55; ufo.dir = -1; }
    startUFOHum();
    ufoTimer = 600 + Math.floor(Math.random()*400);
  }
  if (ufo) {
    if (ufo.dying) { if (--ufo.dt <= 0) ufo = null; }
    else {
      ufo.x += ufo.dir * 2;
      if (ufo.x > W+60 || ufo.x < -60) { stopUFOHum(); ufo = null; }
    }
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  if (phase === 'start') { drawStart(); return; }

  // HUD
  ctx.font = '16px "Courier New"';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'left';
  ctx.fillText('SCORE ' + score, 16, 28);
  ctx.textAlign = 'center';
  ctx.fillText('HI ' + hiScore, W/2, 28);
  ctx.textAlign = 'right';
  ctx.fillText('WAVE ' + wave, W-16, 28);

  // Ground line
  ctx.strokeStyle = '#00ff44'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0,H-10); ctx.lineTo(W,H-10); ctx.stroke();

  // Lives indicator
  ctx.fillStyle = '#00ff44'; ctx.font = '13px "Courier New"'; ctx.textAlign = 'left';
  ctx.fillText('LIVES: ' + lives, 16, H-18);

  // Shields
  ctx.fillStyle = '#00cc44';
  for (const sh of shields)
    for (let r=0; r<SH_ROWS; r++) for (let c=0; c<SH_COLS; c++)
      if (sh.g[r*SH_COLS+c]) ctx.fillRect(sh.x+c*SH_PX, sh.y+r*SH_PX, SH_PX, SH_PX);

  // Aliens
  for (const a of grid) {
    if (!a.alive) continue;
    const p  = alienPos(a);
    const sp = ALIEN_TYPES[a.type];
    ctx.fillStyle = sp.color;
    sp.frames[animFrame].forEach((bits, row) => {
      for (let col=0; col<8; col++)
        if (bits & (1<<(7-col))) ctx.fillRect(p.x+col*SCALE, p.y+row*SCALE, SCALE, SCALE);
    });
  }

  // UFO
  if (ufo) {
    if (ufo.dying) {
      ctx.fillStyle = '#ff4444'; ctx.font='15px "Courier New"'; ctx.textAlign='center';
      ctx.fillText(ufo.dying + ' PTS', ufo.x+25, ufo.y+12);
    } else { drawUFO(ufo.x, ufo.y); }
  }

  // Player bullet
  ctx.fillStyle = '#fff';
  for (const b of bullets) ctx.fillRect(b.x-1, b.y-10, 3, 10);

  // Alien bullets (staggered to look jagged)
  ctx.fillStyle = '#ff8833';
  for (const b of abuls) {
    ctx.fillRect(b.x-2, b.y,   3, 4);
    ctx.fillRect(b.x+1, b.y+4, 3, 4);
  }

  // Player ship
  const blink = player.inv > 0 && Math.floor(player.inv/6)%2===1;
  if (!blink) drawShip(player.x, PLAYER_Y);

  if (phase==='gameover') drawOverlay('GAME OVER',   'Score: ' + score,              '#ff3333');
  if (phase==='win')      drawOverlay('WAVE CLEAR!', 'Score: ' + score + '  — Press Space', '#00ff88');
}

function drawShip(x, y) {
  ctx.fillStyle = '#00ff44';
  ctx.fillRect(x-20, y-10, 40, 10);
  ctx.fillRect(x-13, y-17, 26,  7);
  ctx.fillRect(x-3,  y-23,  6,  7);
}

function drawUFO(x, y) {
  ctx.fillStyle = '#cc2222';
  ctx.beginPath(); ctx.ellipse(x+25, y+6, 25, 10, 0, Math.PI, 0); ctx.fill();
  ctx.fillRect(x+5, y+6, 40, 10);
  ctx.fillStyle = '#ff8888';
  [12,25,38].forEach(ox => ctx.fillRect(x+ox, y+8, 4, 4));
}

function drawStart() {
  ctx.textAlign = 'center';
  ctx.fillStyle = '#00ff44'; ctx.font = 'bold 52px "Courier New"';
  ctx.fillText('SPACE INVADERS', W/2, 110);

  // Score table
  [{type:2,label:'= 30 PTS'},{type:1,label:'= 20 PTS'},{type:0,label:'= 10 PTS'},{ufo:true,label:'= ??? PTS'}]
    .forEach(({type,ufo:isUFO,label},i) => {
      const y = 185 + i*55;
      if (isUFO) {
        drawUFO(W/2-55, y-10);
      } else {
        const sp = ALIEN_TYPES[type];
        ctx.fillStyle = sp.color;
        sp.frames[0].forEach((bits,row) => {
          for(let col=0;col<8;col++) if(bits&(1<<(7-col))) ctx.fillRect(W/2-55+col*3, y-18+row*3, 3, 3);
        });
      }
      ctx.fillStyle='#fff'; ctx.textAlign='left'; ctx.font='15px "Courier New"';
      ctx.fillText(label, W/2-12, y+2);
      ctx.textAlign='center';
    });

  ctx.fillStyle='#777'; ctx.font='13px "Courier New"';
  ctx.fillText('← → / A D   Move          Space / ↑   Shoot', W/2, 430);

  if (Math.floor(Date.now()/600)%2===0) {
    ctx.fillStyle='#00ff88'; ctx.font='bold 19px "Courier New"';
    ctx.fillText('Press Space or click to start', W/2, 490);
  }
}

function drawOverlay(title, sub, col) {
  ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle=col; ctx.font='bold 54px "Courier New"'; ctx.fillText(title, W/2, H/2-30);
  ctx.fillStyle='#ccc'; ctx.font='20px "Courier New"';   ctx.fillText(sub,   W/2, H/2+18);
  ctx.fillStyle='#667'; ctx.font='14px "Courier New"';
  ctx.fillText('Press Space or click to play again', W/2, H/2+56);
}

// ── Loop ──────────────────────────────────────────────────────────────────────
function loop() { update(); render(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
